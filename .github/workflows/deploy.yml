name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore data.json
        run: |
          CONTENT=$(curl -s -H "Authorization: Bearer ${{ secrets.SOCCER }}" \
            "https://api.github.com/repos/kondokensuke1984-collab/soccer-app/contents/data.json" \
            | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())" 2>/dev/null || true)
          if [ -z "$CONTENT" ]; then
            echo '{"matches":[],"lifting":[],"deleted":[]}' > data.json
          else
            echo "$CONTENT" > data.json
          fi

      - name: Inject token
        run: sed -i "s|__GH_SYNC_TOKEN__|${{ secrets.SOCCER }}|g" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
